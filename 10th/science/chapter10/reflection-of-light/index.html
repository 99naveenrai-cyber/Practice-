<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IDEAKDC | Reflection of Light Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Noto+Sans+Devanagari:wght@500;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1B2D;--card:#16233A;--edge:#2b4268;--gold:#FFC93C;--green:#4ADE80;--red:#F87171;--text:#EAF0F6;--muted:#9CB2D1;--blue:#38BDF8;--pink:#F472B6;}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 8%,rgba(56,189,248,.22),transparent 35%),radial-gradient(circle at 85% 30%,rgba(74,222,128,.14),transparent 35%),linear-gradient(180deg,#0F1B2D,#09111f);color:var(--text);font-family:Poppins,'Noto Sans Devanagari',sans-serif;padding:18px 12px 40px}.wrap{width:100%;max-width:520px;margin:auto}.brand{text-align:center;font-family:'Berkshire Swash',cursive;font-size:34px;color:var(--gold);text-shadow:0 0 16px rgba(255,201,60,.45);margin-top:2px}.sub{text-align:center;color:var(--muted);font-size:13px;letter-spacing:1.2px;text-transform:uppercase;margin:2px 0 14px}.videoBox{background:#000;border:2px solid var(--edge);border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35);margin-bottom:14px}.videoFrame{position:relative;width:100%;padding-top:56.25%;background:#000}.videoFrame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}.ytFallback{display:block;text-align:center;text-decoration:none;font-weight:800;color:#101010;background:var(--gold);padding:12px;border-top:1px solid rgba(255,255,255,.18)}.card{background:rgba(22,35,58,.96);border:1px solid var(--edge);border-radius:20px;padding:20px 16px;box-shadow:0 12px 32px rgba(0,0,0,.35);position:relative;overflow:hidden}.qStart{text-align:center}.title{font-family:'Berkshire Swash',cursive;color:var(--gold);font-size:27px;margin:0 0 8px}.small{color:var(--muted);font-size:13px;line-height:1.5}.btn{border:0;border-radius:14px;padding:13px 16px;font-weight:900;font-family:Poppins,'Noto Sans Devanagari',sans-serif;cursor:pointer;background:var(--gold);color:#160f05;margin:6px;box-shadow:0 4px 0 #b98200}.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #b98200}.btn.secondary{background:#263a5c;color:var(--text);border:1px solid #3d557e;box-shadow:0 4px 0 #13223a}.top{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-bottom:12px}.soundBtn{background:#223653;color:var(--text);border:1px solid #45699e;border-radius:999px;padding:7px 11px;font-weight:800;cursor:pointer}.question{font-size:20px;line-height:1.38;font-weight:900;margin:10px 0 14px}.optionWrap{margin:8px 0}.option{width:100%;text-align:left;background:#1C2C48;border:1px solid var(--edge);color:var(--text);border-radius:15px;padding:14px 12px;font-size:15px;font-weight:750;cursor:pointer;line-height:1.35}.option:hover{border-color:var(--gold)}.option.correct{background:rgba(74,222,128,.18);border-color:var(--green);box-shadow:0 0 18px rgba(74,222,128,.7)}.option.wrong{background:rgba(248,113,113,.14);border-color:var(--red);box-shadow:0 0 12px rgba(248,113,113,.45)}.feedback{margin:8px 0 2px;padding:10px 12px;border-radius:14px;font-size:23px;line-height:1.15;font-weight:900;text-align:center;font-family:'Noto Sans Devanagari',Poppins,sans-serif;animation:pop .22s ease both}.feedback.ok{color:var(--green);background:rgba(74,222,128,.1);text-shadow:0 0 14px rgba(74,222,128,.9)}.feedback.bad{color:#fecaca;background:rgba(248,113,113,.12);text-shadow:0 0 12px rgba(248,113,113,.65)}@keyframes pop{from{transform:scale(.84);opacity:.2}to{transform:scale(1);opacity:1}}.needAnswer{display:none;margin-top:12px;font-family:'Noto Sans Devanagari',sans-serif;font-size:27px;font-weight:900;color:var(--gold);text-align:center;text-shadow:0 0 18px rgba(255,201,60,.75);animation:pop .25s ease both}.controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.controls .btn{width:100%;margin:0}.shake{animation:shake .28s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}.hidden{display:none!important}.nameInput{width:100%;background:#1C2C48;border:1px solid var(--edge);color:var(--text);font-size:16px;padding:14px;border-radius:13px;margin:10px 0 14px}.result{text-align:center}.coin{font-size:50px}.scoreBig{font-size:36px;color:var(--gold);font-family:'Berkshire Swash',cursive;margin:4px 0}.shareGrid{display:grid;grid-template-columns:1fr;gap:9px;margin-top:16px}.shareGrid .btn{width:100%;margin:0}.wa{background:#25D366;color:#06210f}.fb{background:#1877F2;color:white}.ig{background:linear-gradient(90deg,#F58529,#DD2A7B,#8134AF,#515BD4);color:white}.copy{background:#38BDF8;color:#04131f}.footer{text-align:center;color:var(--muted);font-size:11px;margin-top:14px}.particle{position:fixed;z-index:9999;pointer-events:none;font-size:22px;animation:flyUp 950ms ease-out forwards}@keyframes flyUp{0%{transform:translate(0,0) scale(.7) rotate(0deg);opacity:1}100%{transform:translate(var(--x),-170px) scale(1.3) rotate(320deg);opacity:0}}.bigCelebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;z-index:9998;pointer-events:none;animation:bigPop 1s ease-out forwards}@keyframes bigPop{0%{opacity:0;transform:scale(.3)}30%{opacity:1;transform:scale(1.12)}100%{opacity:0;transform:scale(1.5) translateY(-80px)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">IDEAKDC</div>
  <div class="sub">Video ka Quiz · Reflection of Light</div>

  <div class="video-box">
  <iframe
    width="100%"
    height="315"
    src="https://www.youtube.com/embed/tlZLUOBury4"
    title="Refraction through Rectangular Glass Slab"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
  </div>
    <a class="ytFallback" href="https://youtu.be/tlZLUOBury4" target="_blank" rel="noopener">Video नहीं दिख रहा? YouTube पर खोलो</a>
  </div>

  <div class="card" id="quizCard"><div id="app"></div></div>

  <div class="card hidden" id="nameCard" style="margin-top:14px">
    <h2 class="title">Shaandaar!</h2>
    <p class="small">Apna naam likho. Result ke baad share buttons milenge.</p>
    <input class="nameInput" id="nameInput" placeholder="Apna naam likhein" />
    <button class="btn" id="resultBtn">Result Dekho</button>
  </div>

  <div class="card hidden result" id="resultCard" style="margin-top:14px">
    <div id="greeting" class="small"></div>
    <div class="coin">🪙</div>
    <div class="scoreBig" id="scoreText">0/10</div>
    <div class="small" id="positiveLine"></div>
    <div class="shareGrid">
      <button class="btn wa" id="whatsappBtn">WhatsApp पर Share</button>
      <button class="btn wa" id="statusBtn">WhatsApp Status के लिए Copy + Open</button>
      <button class="btn fb" id="facebookBtn">Facebook पर Share</button>
      <button class="btn ig" id="instagramBtn">Instagram के लिए Copy + Open</button>
      <button class="btn ig" id="instaStoryBtn">Instagram Story के लिए Copy + Open</button>
      <button class="btn copy" id="copyBtn">Link Copy</button>
    </div>
  </div>
  <div class="footer">IDEAKDC · practicekarlo.ideakdc.in</div>
</div>

<script>
const BASE_LINK = 'https://practicekarlo.ideakdc.in/10th/science/chapter10/reflection-of-light/';
const QUESTIONS = [
 {q:'A highly polished surface mostly does what to the light falling on it?',opts:['Reflects most light','Absorbs all light','Refracts all light','Stops light completely'],ans:0},
 {q:'According to the first law of reflection, angle of incidence is equal to:',opts:['Angle of refraction','Angle of reflection','Angle of deviation','Angle of dispersion'],ans:1},
 {q:'Incident ray, reflected ray and normal at the point of incidence lie in:',opts:['Different planes','Same plane','Opposite planes','No fixed plane'],ans:1},
 {q:'Image formed by a plane mirror is always:',opts:['Real and inverted','Virtual and erect','Real and erect','Virtual and inverted'],ans:1},
 {q:'In a plane mirror, image distance is:',opts:['Less than object distance','Greater than object distance','Equal to object distance','Always zero'],ans:2},
 {q:'Reflecting surface curved inwards is called:',opts:['Convex mirror','Plane mirror','Concave mirror','Transparent mirror'],ans:2},
 {q:'Reflecting surface curved outwards is called:',opts:['Concave mirror','Convex mirror','Plane mirror','Rough mirror'],ans:1},
 {q:'The centre of the reflecting surface of a spherical mirror is called:',opts:['Focus','Pole','Aperture','Principal axis'],ans:1},
 {q:'The centre of the sphere of which a spherical mirror is a part is:',opts:['Pole','Principal focus','Centre of curvature','Aperture'],ans:2},
 {q:'The line passing through pole and centre of curvature is called:',opts:['Principal axis','Normal axis','Focal line','Mirror line'],ans:0}
];
const CORRECT_MSGS=['सही है','Good Going!','Wah!','शानदार','अद्भुत','कमाल कर दिया','Outstanding!','Excellent!','बिलकुल सही जवाब','ठीक है'];
const WRONG_MSGS=['गलत है जी','दोबारा ट्राई करो','फिर से सोचो','दिमाग लगाओ','कैसे कैसे लोग आ जाते हैं','नहीं... नहीं...','गलत है','एक मौका दिया'];
const WRONG_EMOJI=['😔','😢','☹️','😟','🙁'];
let idx=0, score=0, lastOk=-1, lastBad=-1, soundOn=true;
let states=QUESTIONS.map(()=>({done:false, firstTry:true, scoreGiven:false, selected:null, feedback:null, feedbackType:null}));
const app=document.getElementById('app');
function randNoRepeat(arr,last){let n=Math.floor(Math.random()*arr.length); if(arr.length>1 && n===last)n=(n+1)%arr.length; return n;}
function playTone(type){ if(!soundOn) return; try{const A=window.AudioContext||window.webkitAudioContext; const ctx=new A(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); if(type==='ok'){o.frequency.setValueAtTime(680,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(980,ctx.currentTime+.13);g.gain.setValueAtTime(.08,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.22);}else{o.frequency.setValueAtTime(210,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(130,ctx.currentTime+.18);g.gain.setValueAtTime(.06,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);} o.start(); o.stop(ctx.currentTime+.26);}catch(e){} }
function confetti(big=false){const emojis=big?['🎉','🎊','✨','⭐','💥','🏆']:['✨','🎉','⭐']; const count=big?44:16; for(let i=0;i<count;i++){const p=document.createElement('span');p.className='particle';p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.left=(35+Math.random()*30)+'vw';p.style.top=(big?75:52)+'vh';p.style.setProperty('--x',((Math.random()*240)-120)+'px');document.body.appendChild(p);setTimeout(()=>p.remove(),1050);} if(big){const b=document.createElement('div');b.className='bigCelebration';b.textContent='🎊';document.body.appendChild(b);setTimeout(()=>b.remove(),1100);} }
function start(){idx=0;score=0;states=QUESTIONS.map(()=>({done:false, firstTry:true, scoreGiven:false, selected:null, feedback:null, feedbackType:null}));document.getElementById('quizCard').classList.remove('hidden');document.getElementById('nameCard').classList.add('hidden');document.getElementById('resultCard').classList.add('hidden');render();}
function startScreen(){app.innerHTML=`<div class="qStart"><h1 class="title">Reflection of Light</h1><div class="small">Class 10 Science • 10 MCQ<br>Video dekhna optional hai. Quiz turant start kar sakte ho.</div><br><button class="btn" id="startBtn">Start Quiz</button></div>`;document.getElementById('startBtn').onclick=start;}
function render(){const q=QUESTIONS[idx],st=states[idx]; app.innerHTML=`<div class="top"><div>Q ${idx+1}/${QUESTIONS.length}</div><div>First-try score: ${score}</div><button class="soundBtn" id="soundBtn">${soundOn?'🔊 Sound ON':'🔇 Sound OFF'}</button></div><div class="question">${q.q}</div><div id="opts">${q.opts.map((o,i)=>`<div class="optionWrap"><button class="option ${st.done&&i===q.ans?'correct':''} ${st.selected===i&&st.feedbackType==='bad'?'wrong':''}" data-i="${i}"><b>${String.fromCharCode(65+i)}.</b> ${o}</button>${st.selected===i&&st.feedback?`<div class="feedback ${st.feedbackType==='ok'?'ok':'bad'}">${st.feedback}</div>`:''}</div>`).join('')}</div><div class="needAnswer" id="needAnswer">मुझे इसका जवाब चाहिए</div><div class="controls"><button class="btn secondary" id="prevBtn">Previous</button><button class="btn secondary" id="nextBtn">${idx===QUESTIONS.length-1?'Finish':'Next'}</button><button class="btn secondary" id="restartBtn">Restart</button><button class="btn" id="finishBtn">Finish</button></div>`;document.getElementById('soundBtn').onclick=()=>{soundOn=!soundOn;render();};document.querySelectorAll('.option').forEach(b=>b.onclick=()=>pick(+b.dataset.i));document.getElementById('prevBtn').onclick=prev;document.getElementById('nextBtn').onclick=next;document.getElementById('finishBtn').onclick=finish;document.getElementById('restartBtn').onclick=startScreen;}
function pick(i){const q=QUESTIONS[idx],st=states[idx]; if(st.done)return; st.selected=i; if(i===q.ans){lastOk=randNoRepeat(CORRECT_MSGS,lastOk);st.feedback=CORRECT_MSGS[lastOk];st.feedbackType='ok';st.done=true;if(st.firstTry&&!st.scoreGiven){score++;st.scoreGiven=true;} playTone('ok');render();confetti(false);if(idx+1===5||idx+1===10)confetti(true);}else{lastBad=randNoRepeat(WRONG_MSGS,lastBad);st.feedback=WRONG_EMOJI[Math.floor(Math.random()*WRONG_EMOJI.length)]+' '+WRONG_MSGS[lastBad];st.feedbackType='bad';st.firstTry=false;playTone('bad');render(); const btn=document.querySelector(`.option[data-i="${i}"]`); if(btn)btn.classList.add('shake');}}
function requireAnswer(){const m=document.getElementById('needAnswer'); if(m){m.style.display='block'; playTone('bad'); setTimeout(()=>{if(m)m.style.display='none'},1800);} }
function next(){if(!states[idx].done){requireAnswer();return;} if(idx<QUESTIONS.length-1){idx++;render();}else finish();}
function prev(){if(idx>0){idx--;render();}}
function finish(){if(!states[idx].done){requireAnswer();return;} document.getElementById('quizCard').classList.add('hidden');document.getElementById('nameCard').classList.remove('hidden');}
document.getElementById('resultBtn').onclick=()=>{const name=(document.getElementById('nameInput').value||'Student').trim();document.getElementById('nameCard').classList.add('hidden');document.getElementById('resultCard').classList.remove('hidden');document.getElementById('greeting').textContent=`Shaabash, ${name}!`;document.getElementById('scoreText').textContent=`${score}/10`;document.getElementById('positiveLine').textContent= score>=8?'बहुत बढ़िया! आपकी तैयारी मजबूत हो रही है।': score>=5?'Good going! Practice se score aur strong hoga.':'कोई बात नहीं, दोबारा practice करो — improvement पक्का है।'; setupShare(name); confetti(true);};
function shareText(name){return `🎉 ${name} ने IdeaKDC पर Reflection of Light Quiz खेला!\nPractice karo, score badhao, confidence banao.\n\nआप भी quiz खेलिए 👇\n${BASE_LINK}`;}
async function copyText(t){try{await navigator.clipboard.writeText(t);alert('Link/message copied. अब paste करके share कर दो.');}catch(e){prompt('Copy this:',t);}}
function setupShare(name){const text=shareText(name);document.getElementById('whatsappBtn').onclick=()=>window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');document.getElementById('statusBtn').onclick=()=>{copyText(text);window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');};document.getElementById('facebookBtn').onclick=()=>window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(BASE_LINK)+'&quote='+encodeURIComponent(text),'_blank');document.getElementById('instagramBtn').onclick=()=>{copyText(text);window.open('https://www.instagram.com/','_blank');};document.getElementById('instaStoryBtn').onclick=()=>{copyText(text);window.open('https://www.instagram.com/','_blank');};document.getElementById('copyBtn').onclick=()=>copyText(BASE_LINK);}
startScreen();
</script>
</body>
</html>
