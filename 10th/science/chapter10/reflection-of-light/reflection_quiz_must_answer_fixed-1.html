<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEAKDC Reflection of Light Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1B2D;--card:#16233A;--edge:#263A5C;--gold:#FFC93C;--green:#4ADE80;--red:#F87171;--text:#EAF0F6;--muted:#9DB0CB}*{box-sizing:border-box}body{margin:0;background:#0F1B2D;color:var(--text);font-family:Poppins,sans-serif;min-height:100vh;padding:22px 14px 40px}.wrap{max-width:520px;margin:0 auto}.brand{text-align:center;font-family:'Berkshire Swash',cursive;font-size:38px;color:var(--gold);margin:12px 0 4px}.subbrand{text-align:center;color:var(--muted);font-size:13px;letter-spacing:2.5px;margin-bottom:20px;text-transform:uppercase}.video-box{background:#000;border-radius:18px;overflow:hidden;margin-bottom:12px}.video-ratio{position:relative;width:100%;padding-top:56.25%}.video-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:0}.video-fallback{text-align:center;margin:8px 0 18px}.video-fallback a{display:inline-block;color:#07111d;background:var(--gold);padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:800}.card{background:var(--card);border:1px solid var(--edge);border-radius:22px;padding:20px 16px;box-shadow:0 12px 35px rgba(0,0,0,.35);margin-top:14px}.hidden{display:none!important}.q-title{font-family:'Berkshire Swash',cursive;color:var(--gold);font-size:30px;text-align:center;margin:5px 0 12px}.q-sub{text-align:center;color:var(--muted);font-size:13px;line-height:1.5}.q-btn,.primary-btn{border:0;border-radius:14px;padding:13px 14px;font-weight:900;font-family:Poppins,sans-serif;cursor:pointer;background:var(--gold);color:#1a1206;box-shadow:0 5px 0 #9a720c}.q-btn.secondary{background:#263A5C;color:var(--text);box-shadow:none;border:1px solid #3d557e}.q-top{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:10px}.sound-row{display:flex;justify-content:center;margin:0 0 12px}.sound-btn{background:#263A5C;color:var(--text);border:1px solid #3d557e;border-radius:999px;padding:8px 14px;font-weight:800}.q-bar-wrap{height:12px;background:#0d1728;border-radius:20px;overflow:hidden;margin:8px 0 13px}.q-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));transition:width 1s linear}.q-question{font-size:20px;line-height:1.35;font-weight:900;margin:14px 0}.q-option{width:100%;text-align:left;background:#1C2C48;border:1px solid var(--edge);color:var(--text);border-radius:16px;padding:14px 12px;margin:8px 0 0;font-size:15px;font-weight:750;cursor:pointer;line-height:1.35}.q-option.correct{background:rgba(74,222,128,.18);border-color:var(--green);box-shadow:0 0 16px rgba(74,222,128,.7)}.q-option.wrong{background:rgba(248,113,113,.18);border-color:var(--red);box-shadow:0 0 16px rgba(248,113,113,.55)}.option-feedback{font-size:25px;font-weight:900;line-height:1.25;margin:7px 0 8px;padding:8px 12px;border-radius:14px}.option-feedback.good{color:#dfffe9;text-shadow:0 0 12px rgba(74,222,128,.95);background:rgba(74,222,128,.12)}.option-feedback.bad{color:#ffe2e2;text-shadow:0 0 12px rgba(248,113,113,.8);background:rgba(248,113,113,.13)}.q-controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}.q-controls .q-btn{width:100%;margin:0}.q-note{font-size:12px;color:var(--muted);line-height:1.4;margin-top:12px;text-align:center}.name-input{width:100%;background:#1C2C48;border:1px solid var(--edge);color:var(--text);font-family:inherit;font-size:15px;padding:13px 14px;border-radius:12px;margin-bottom:14px}.quiz-title{font-family:'Berkshire Swash',cursive;font-size:24px;margin:0 0 10px;color:var(--gold)}.result-wrap{text-align:center}.coin{font-size:52px;display:block;margin:6px 0 2px}.coin-count{font-family:'Berkshire Swash',cursive;font-size:44px;color:var(--gold);margin:0}.coin-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px}.score-line{font-size:17px;margin-bottom:18px}.share-grid{display:grid;grid-template-columns:1fr;gap:10px}.share-btn{background:#25D366;color:#06210f}.insta-btn{background:linear-gradient(90deg,#F58529,#DD2A7B,#8134AF);color:#fff}.status-btn{background:#128C7E;color:#fff}.footer-note{text-align:center;color:var(--muted);font-size:12px;margin-top:18px}.popper-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999}.confetti{position:absolute;bottom:-20px;width:10px;height:16px;border-radius:3px;animation:upPop 1.5s ease-out forwards}.confetti.big{width:15px;height:24px;animation-duration:2.1s}@keyframes upPop{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--x),-105vh) rotate(720deg);opacity:0}}
.must-answer{font-size:26px;font-weight:900;text-align:center;color:#fff7d6;background:rgba(255,201,60,.14);border:2px solid rgba(255,201,60,.75);border-radius:16px;padding:12px 10px;margin:12px 0 4px;text-shadow:0 0 14px rgba(255,201,60,.95);animation:mustPulse .8s ease-in-out 2}@keyframes mustPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style>
</head>
<body>
<div class="popper-layer" id="popperLayer"></div>
<div class="wrap">
  <div class="brand">IDEAKDC</div><div class="subbrand">Video ka Quiz</div>
  <div class="video-box"><div class="video-ratio"><iframe src="https://www.youtube.com/embed/tlZLUOBury4?rel=0&modestbranding=1&playsinline=1" title="IDEAKDC Video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div></div>
  <div class="video-fallback"><a href="https://youtu.be/tlZLUOBury4" target="_blank" rel="noopener">Video नहीं दिख रहा? YouTube पर खोलो</a></div>
  <div class="card" id="quiz-card"><div id="ideakdc-quiz-app"></div></div>
  <div class="card hidden" id="screen-name"><h2 class="quiz-title">Shaandaar!</h2><p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Apna naam likho taaki score aur coins dikha sakein.</p><input type="text" id="name-input" class="name-input" placeholder="Apna naam yahan likhein"><button class="primary-btn" id="submit-name-btn">Result Dekho</button></div>
  <div class="card hidden result-wrap" id="screen-result"><div id="result-greeting" style="color:var(--muted);font-size:14px;"></div><span class="coin">🪙</span><p class="coin-count" id="coin-count">0</p><div class="coin-label">Coins Earned</div><div class="score-line">Score: <b id="score-text"></b></div><div class="share-grid"><button class="primary-btn share-btn" id="share-btn">WhatsApp Share</button><button class="primary-btn status-btn" id="status-btn">WhatsApp Status Text Copy</button><button class="primary-btn insta-btn" id="insta-btn">Instagram Story Text Copy</button></div></div>
  <div class="footer-note">IDEAKDC · Apni video dekho, seekho, coins jeeto</div>
</div>
<script>
var QUIZ_TITLE='Reflection of Light';
var COINS_PER_CORRECT=10;
var PUBLIC_QUIZ_URL='https://practicekarlo.ideakdc.in/10th/science/chapter10/reflection-of-light/';
var CORRECT_MESSAGES=['सही है','Good Going!','Wah!','शानदार','अद्भुत','कमाल कर दिया','Outstanding!','Excellent!','बिलकुल सही जवाब','ठीक है'];
var WRONG_MESSAGES=['गलत है जी','दोबारा ट्राई करो','फिर से सोचो','दिमाग लगाओ','कैसे कैसे लोग आ जाते हैं','नहीं... नहीं...','गलत है','एक मौका दिया'];
var QUESTIONS=[
{q:'A highly polished surface mostly does what to the light falling on it?',opts:['Reflects most light','Absorbs all light','Refracts all light','Stops light completely'],ans:0},
{q:'According to the first law of reflection, angle of incidence is equal to:',opts:['Angle of refraction','Angle of reflection','Angle of deviation','Angle of dispersion'],ans:1},
{q:'Incident ray, reflected ray and normal at the point of incidence lie in:',opts:['Different planes','Same plane','Opposite planes','No fixed plane'],ans:1},
{q:'Image formed by a plane mirror is always:',opts:['Real and inverted','Virtual and erect','Real and erect','Virtual and inverted'],ans:1},
{q:'In a plane mirror, image distance is:',opts:['Less than object distance','Greater than object distance','Equal to object distance','Always zero'],ans:2},
{q:'Reflecting surface curved inwards is called:',opts:['Convex mirror','Plane mirror','Concave mirror','Transparent mirror'],ans:2},
{q:'Reflecting surface curved outwards is called:',opts:['Concave mirror','Convex mirror','Plane mirror','Rough mirror'],ans:1},
{q:'The centre of the reflecting surface of a spherical mirror is called:',opts:['Focus','Pole','Aperture','Principal axis'],ans:1},
{q:'The centre of the sphere of which a spherical mirror is a part is:',opts:['Pole','Principal focus','Centre of curvature','Aperture'],ans:2},
{q:'The line passing through pole and centre of curvature is called:',opts:['Principal axis','Normal axis','Focal line','Mirror line'],ans:0}
];
var soundOn=true,lastCorrect='',lastWrong='';try{soundOn=localStorage.getItem('ideakdc_sound')!=='off'}catch(e){}
function randomNoRepeat(arr,last){var pick=arr[Math.floor(Math.random()*arr.length)];if(arr.length>1){while(pick===last){pick=arr[Math.floor(Math.random()*arr.length)]}}return pick}
function beep(freq,dur,type,vol){if(!soundOn)return;try{var ctx=new (window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator();var g=ctx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||.08;o.connect(g);g.connect(ctx.destination);o.start();setTimeout(function(){o.stop();ctx.close()},dur)}catch(e){}}
function correctSound(){beep(760,90);setTimeout(function(){beep(980,120)},100)}function wrongSound(){beep(180,160,'sine',.05)}function finishSound(){beep(650,120);setTimeout(function(){beep(850,120)},130);setTimeout(function(){beep(1050,180)},260)}
function poppers(big){var layer=document.getElementById('popperLayer');var colors=['#FFC93C','#4ADE80','#38BDF8','#F87171','#DD2A7B','#FFFFFF'];var count=big?90:28;for(var i=0;i<count;i++){var el=document.createElement('span');el.className='confetti'+(big?' big':'');el.style.left=(5+Math.random()*90)+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.setProperty('--x',(Math.random()*220-110)+'px');el.style.animationDelay=(Math.random()*.25)+'s';layer.appendChild(el);setTimeout((function(x){return function(){x.remove()}})(el),2400)}}
function animateCoinCount(target){var el=document.getElementById('coin-count');var curr=0;var step=Math.max(1,Math.ceil(target/20));var iv=setInterval(function(){curr=Math.min(target,curr+step);el.textContent=curr;if(curr>=target)clearInterval(iv)},30)}
function makeShareMessage(name,correct,total,coins){var positive=correct>=8?'Outstanding performance!':(correct>=6?'Good going! Practice se aur strong banoge.':'Good attempt! Dobara practice karo, score badhega.');return '🎉 '+name+' ne IDEAKDC ka "'+QUIZ_TITLE+'" quiz complete kiya!\n'+positive+'\nScore: '+correct+'/'+total+' | Coins: '+coins+'\nAap bhi try karo 👇\n'+PUBLIC_QUIZ_URL}
window.ideakdcFinish=function(correctCount,totalQuestions){document.getElementById('quiz-card').classList.add('hidden');try{var lastName=localStorage.getItem('ideakdc_last_name');if(lastName)document.getElementById('name-input').value=lastName}catch(e){}document.getElementById('screen-name').classList.remove('hidden');document.getElementById('submit-name-btn').onclick=function(){var name=document.getElementById('name-input').value.trim()||'Student';var coins=correctCount*COINS_PER_CORRECT;try{localStorage.setItem('ideakdc_last_name',name)}catch(e){}document.getElementById('result-greeting').textContent='Shaabash, '+name+'!';document.getElementById('score-text').textContent=correctCount+'/'+totalQuestions;document.getElementById('screen-name').classList.add('hidden');document.getElementById('screen-result').classList.remove('hidden');animateCoinCount(coins);finishSound();poppers(true);var msg=makeShareMessage(name,correctCount,totalQuestions,coins);document.getElementById('share-btn').onclick=function(){window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank')};document.getElementById('status-btn').onclick=function(){if(navigator.clipboard){navigator.clipboard.writeText(msg)}alert('Status text copied. WhatsApp Status me paste karo.')};document.getElementById('insta-btn').onclick=function(){if(navigator.clipboard){navigator.clipboard.writeText(msg)}alert('Instagram Story text copied. Story me link/text paste karo.')}}};
(function(){var app=document.getElementById('ideakdc-quiz-app');var idx=0,score=0,selected=[],locked=[],timeLeft=30,timer=null,finished=false;
function shuffleOptions(){QUESTIONS.forEach(function(q){var correct=q.opts[q.ans];for(var i=q.opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=q.opts[i];q.opts[i]=q.opts[j];q.opts[j]=t}q.ans=q.opts.indexOf(correct)})}
function soundButton(){return '<div class="sound-row"><button class="sound-btn" id="soundBtn">'+(soundOn?'🔊 Sound ON':'🔇 Sound OFF')+'</button></div>'}
function startScreen(){app.innerHTML=soundButton()+'<div class="q-title">Reflection of Light</div><div class="q-sub">Class 10 Science • 10 MCQ • गलत होने पर फिर से कोशिश करो</div><div style="text-align:center;margin-top:16px"><button class="q-btn" id="startBtn">Start Quiz</button></div>';document.getElementById('soundBtn').onclick=toggleSound;document.getElementById('startBtn').onclick=restart}
function toggleSound(){soundOn=!soundOn;try{localStorage.setItem('ideakdc_sound',soundOn?'on':'off')}catch(e){}startScreen()}
function restart(){clearInterval(timer);shuffleOptions();idx=0;score=0;selected=Array(QUESTIONS.length).fill(null);locked=Array(QUESTIONS.length).fill(false);finished=false;document.getElementById('quiz-card').classList.remove('hidden');document.getElementById('screen-name').classList.add('hidden');document.getElementById('screen-result').classList.add('hidden');show()}
function optionHtml(q){var html='';for(var i=0;i<q.opts.length;i++){html+='<div class="option-wrap"><button class="q-option" data-i="'+i+'"><b>'+String.fromCharCode(65+i)+'.</b> '+q.opts[i]+'</button><div class="fb-holder" id="fb-'+i+'"></div></div>'}return html}
function show(){clearInterval(timer);timeLeft=30;var q=QUESTIONS[idx];app.innerHTML=soundButton()+'<div class="q-top"><div>Q '+(idx+1)+'/'+QUESTIONS.length+'</div><div>Score: '+score+'</div><div>Time: <span id="time">30</span>s</div></div><div class="q-bar-wrap"><div class="q-bar" id="bar"></div></div><div class="q-question">'+q.q+'</div>'+optionHtml(q)+'<div class="q-note">गलत जवाब पर फिर से try करो. सही जवाब के बाद ही Next दबेगा.</div><div id="mustAnswerBox"></div><div class="q-controls"><button class="q-btn secondary" id="prev">Previous</button><button class="q-btn secondary" id="next">Next</button><button class="q-btn" id="finish">Finish</button><button class="q-btn secondary" id="restart">Restart</button></div>';document.getElementById('soundBtn').onclick=function(){soundOn=!soundOn;try{localStorage.setItem('ideakdc_sound',soundOn?'on':'off')}catch(e){}show()};document.querySelectorAll('.q-option').forEach(function(b){b.onclick=function(){pick(Number(b.dataset.i))}});document.getElementById('prev').onclick=prev;document.getElementById('next').onclick=next;document.getElementById('finish').onclick=finish;document.getElementById('restart').onclick=startScreen;if(locked[idx])revealCorrect();startTimer()}
function startTimer(){updateTimer();timer=setInterval(function(){if(locked[idx])return;timeLeft--;updateTimer();if(timeLeft<=0){clearInterval(timer);wrongSound();showFeedback(-1,'bad','😔 समय समाप्त! फिर से कोशिश करो')}},1000)}
function updateTimer(){var t=document.getElementById('time'),b=document.getElementById('bar');if(t)t.textContent=timeLeft;if(b)b.style.width=(timeLeft/30*100)+'%'}
function clearFeedbacks(){document.querySelectorAll('.fb-holder').forEach(function(h){h.innerHTML=''});document.querySelectorAll('.q-option').forEach(function(b){b.classList.remove('wrong','correct')})}
function showFeedback(i,type,msg){clearFeedbacks();if(i>=0){document.querySelector('.q-option[data-i="'+i+'"]').classList.add(type==='good'?'correct':'wrong');document.getElementById('fb-'+i).innerHTML='<div class="option-feedback '+type+'">'+(type==='bad'?'😔 ':'')+msg+'</div>'}else{document.querySelector('.fb-holder').innerHTML='<div class="option-feedback '+type+'">'+msg+'</div>'}}
function pick(i){if(locked[idx])return;var q=QUESTIONS[idx];if(i===q.ans){clearInterval(timer);selected[idx]=i;locked[idx]=true;score++;lastCorrect=randomNoRepeat(CORRECT_MESSAGES,lastCorrect);showFeedback(i,'good',lastCorrect);correctSound();poppers(false);if((idx+1)%5===0)poppers(true)}else{selected[idx]=i;lastWrong=randomNoRepeat(WRONG_MESSAGES,lastWrong);showFeedback(i,'bad',lastWrong);wrongSound()}}
function revealCorrect(){var q=QUESTIONS[idx];document.querySelectorAll('.q-option').forEach(function(b,i){if(i===q.ans)b.classList.add('correct')});if(selected[idx]!==null){document.getElementById('fb-'+q.ans).innerHTML='<div class="option-feedback good">✓ सही जवाब</div>'}}
function askForAnswer(){var box=document.getElementById('mustAnswerBox');if(box){box.innerHTML='<div class="must-answer">मुझे इसका जवाब चाहिए</div>';}wrongSound()}function next(){if(!locked[idx]){askForAnswer();return;}if(idx<QUESTIONS.length-1){idx++;show()}else finish()}function prev(){if(idx>0){idx--;show()}}function finish(){clearInterval(timer);if(finished)return;if(!locked[idx]){askForAnswer();return;}finished=true;window.ideakdcFinish(score,QUESTIONS.length)}startScreen()})();
</script>
</body>
</html>
