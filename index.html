<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Karlo — IDEAKDC</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#3EC6FF;
    --sun:#FFC93C;
    --coral:#FF6B5E;
    --leaf:#3ED0A0;
    --ink:#1E2A45;
    --paper:#FFF9EE;
    --card:#FFFFFF;
    --muted:#5b6b8c;
    --faint:#9aa4bb;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 10% 10%, rgba(255,201,60,.30), transparent 40%),
      radial-gradient(circle at 90% 25%, rgba(62,198,255,.30), transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(62,208,160,.20), transparent 50%),
      var(--paper);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
  }
  .wrap{ max-width:960px; margin:0 auto; padding:24px 16px 60px; }

  /* Header */
  header{ text-align:center; margin-bottom:26px; }
  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(28px,7vw,42px);
    margin:0;
  }
  h1 .en{
    display:block;
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:.4em;
    color:var(--muted);
    margin-top:2px;
  }
  .tagline{
    font-weight:600;
    color:var(--muted);
    margin-top:8px;
    font-size:14px;
  }
  .tagline .en{ color:var(--faint); }

  /* Selector card */
  .selector{
    background:var(--card);
    border:3px solid var(--ink);
    border-radius:22px;
    padding:22px 20px;
    box-shadow:0 8px 0 rgba(30,42,69,.08);
    margin-bottom:28px;
  }
  .selector label{
    font-family:'Baloo 2';
    font-weight:700;
    font-size:15px;
    display:block;
    margin-bottom:10px;
  }
  .selector label .en-sub{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--faint);
    margin-top:2px;
  }

  .class-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:20px;
  }
  @media (max-width:480px){ .class-grid{ grid-template-columns:repeat(4,1fr); gap:6px; } }
  .class-grid button{
    padding:12px 4px;
    border:2px solid var(--ink);
    border-radius:12px;
    background:#fff;
    font-family:'Baloo 2';
    font-weight:700;
    font-size:14px;
    cursor:pointer;
  }
  .class-grid button.selected{ background:var(--sun); }

  select#subjectSelect{
    width:100%;
    padding:14px;
    border:2px solid var(--ink);
    border-radius:14px;
    font-family:'Baloo 2';
    font-weight:700;
    font-size:15px;
    background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24'><path fill='%231E2A45' d='M7 10l5 5 5-5z'/></svg>") no-repeat right 14px center;
    appearance:none;
    -webkit-appearance:none;
  }
  select#subjectSelect:disabled{ color:var(--faint); background-color:#f4f4f6; }

  /* Library */
  .library-heading{
    font-family:'Baloo 2';
    font-weight:700;
    font-size:18px;
    margin:0 0 4px;
  }
  .library-heading .en-sub{
    display:block;
    font-size:12px;
    font-weight:600;
    color:var(--faint);
    margin-top:2px;
    font-family:'Nunito';
  }
  .library-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    margin-top:16px;
  }
  @media (min-width:640px){ .library-grid{ grid-template-columns:1fr 1fr; } }

  .game-card{
    background:var(--card);
    border:3px solid var(--ink);
    border-radius:20px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:8px;
    box-shadow:0 6px 0 rgba(30,42,69,.08);
  }
  .badge{
    align-self:flex-start;
    font-family:'Baloo 2';
    font-weight:700;
    font-size:11px;
    padding:3px 10px;
    border-radius:20px;
    color:#fff;
  }
  .badge.quiz{ background:var(--sky); }
  .badge.game{ background:var(--coral); }
  .card-title{
    font-family:'Baloo 2';
    font-weight:700;
    font-size:17px;
    margin:0;
  }
  .card-title .en{
    display:block;
    font-family:'Nunito';
    font-weight:700;
    font-size:.7em;
    color:var(--muted);
  }
  .card-desc{
    font-size:13px;
    color:var(--muted);
    margin:0;
  }
  .play-btn{
    margin-top:auto;
    align-self:flex-start;
    padding:9px 18px;
    border:none;
    border-radius:12px;
    background:var(--leaf);
    color:#fff;
    font-family:'Baloo 2';
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    text-decoration:none;
    border-bottom:3px solid #2ba883;
  }

  .empty-state{
    text-align:center;
    padding:40px 20px;
    color:var(--muted);
  }
  .empty-state .icon{ font-size:36px; margin-bottom:8px; }
  .empty-state .en{ display:block; color:var(--faint); font-size:13px; margin-top:4px; }

  footer{
    text-align:center;
    margin-top:30px;
    font-size:12px;
    color:var(--faint);
    font-weight:600;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>प्रैक्टिस करलो <span class="en">Practice Karlo</span></h1>
    <div class="tagline">
      क्लास और विषय चुनो, गेम्स और क्विज़ खेलो
      <span class="en">Pick your class and subject, then play games &amp; quizzes</span>
    </div>
  </header>

  <div class="selector">
    <label>अपनी क्लास चुनो <span class="en-sub">Choose your class</span></label>
    <div class="class-grid" id="classGrid"></div>

    <label>विषय चुनो <span class="en-sub">Choose subject</span></label>
    <select id="subjectSelect" disabled>
      <option value="">पहले क्लास चुनो / Select class first</option>
    </select>
  </div>

  <div id="libraryHeadingWrap" style="display:none;">
    <div class="library-heading" id="libraryHeading"></div>
  </div>

  <div class="library-grid" id="libraryGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">📘</div>
    <div>अभी शुरुआत करो — ऊपर क्लास और विषय चुनो</div>
    <span class="en">Get started — pick a class and subject above</span>
  </div>

  <footer>IDEAKDC · सीखो, अभ्यास करो, आगे बढ़ो <span class="en">Learn, Practice, Progress</span></footer>
</div>

<script>
/* ============================================================
   GAME LIBRARY DATA
   Structure: DATA[classNumber][subjectKey] = [ {title_hi, title_en, type, desc_hi, desc_en, url} ]
   Add new entries here as you build more games/quizzes.
   ============================================================ */
const SUBJECTS = {
  math:   { hi: "गणित",         en: "Maths" },
  science:{ hi: "विज्ञान",       en: "Science" },
  english:{ hi: "अंग्रेज़ी",      en: "English" },
  hindi:  { hi: "हिंदी",         en: "Hindi" },
  sst:    { hi: "सामाजिक विज्ञान", en: "Social Science" },
  gk:     { hi: "सामान्य ज्ञान", en: "GK" }
};

const CLASSES = [5,6,7,8,9,10,11,12];

const DATA = {
  5:  { math: [ pahadaEntry() ] },
  6:  { math: [ pahadaEntry() ] },
  7:  { math: [ pahadaEntry() ] },
  8:  { math: [ pahadaEntry() ] },
  9:  {},
  10: {},
  11: {},
  12: {}
};

function pahadaEntry(){
  return {
    title_hi: "पहाड़ा अभ्यास",
    title_en: "Pahada Practice",
    type: "quiz",
    desc_hi: "टेबल 2 से 20 तक — टाइमर के साथ अभ्यास करो",
    desc_en: "Multiplication tables 2–20 with a timer",
    url: "pahada-quiz.html"
  };
}

/* ============================================================
   STATE + RENDER
   ============================================================ */
let selectedClass = null;
let selectedSubject = null;

const classGrid = document.getElementById('classGrid');
const subjectSelect = document.getElementById('subjectSelect');
const libraryGrid = document.getElementById('libraryGrid');
const emptyState = document.getElementById('emptyState');
const libraryHeadingWrap = document.getElementById('libraryHeadingWrap');
const libraryHeading = document.getElementById('libraryHeading');

CLASSES.forEach(c => {
  const btn = document.createElement('button');
  btn.textContent = `Class ${c}`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.class-grid button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedClass = c;
    selectedSubject = null;
    populateSubjects();
    renderLibrary();
  });
  classGrid.appendChild(btn);
});

function populateSubjects(){
  subjectSelect.innerHTML = '';
  subjectSelect.disabled = false;
  const placeholder = document.createElement('option');
  placeholder.value = '';
  placeholder.textContent = 'विषय चुनो / Select subject';
  subjectSelect.appendChild(placeholder);

  Object.keys(SUBJECTS).forEach(key => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = `${SUBJECTS[key].hi} — ${SUBJECTS[key].en}`;
    subjectSelect.appendChild(opt);
  });
}

subjectSelect.addEventListener('change', (e) => {
  selectedSubject = e.target.value || null;
  renderLibrary();
});

function renderLibrary(){
  libraryGrid.innerHTML = '';

  if (!selectedClass || !selectedSubject){
    libraryHeadingWrap.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }

  const list = (DATA[selectedClass] && DATA[selectedClass][selectedSubject]) || [];
  const subjLabel = SUBJECTS[selectedSubject];

  libraryHeadingWrap.style.display = 'block';
  libraryHeading.innerHTML =
    `Class ${selectedClass} · ${subjLabel.hi} लाइब्रेरी` +
    `<span class="en-sub">Class ${selectedClass} · ${subjLabel.en} Library</span>`;

  if (list.length === 0){
    emptyState.style.display = 'block';
    emptyState.querySelector('div:nth-child(2)').textContent = 'जल्दी आ रहा है!';
    emptyState.querySelector('.en').textContent = 'Coming soon for this class & subject';
    return;
  }

  emptyState.style.display = 'none';

  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <span class="badge ${item.type}">${item.type === 'quiz' ? 'क्विज़ · Quiz' : 'गेम · Game'}</span>
      <h3 class="card-title">${item.title_hi}<span class="en">${item.title_en}</span></h3>
      <p class="card-desc">${item.desc_hi} <br> <span style="color:var(--faint)">${item.desc_en}</span></p>
      <a class="play-btn" href="${item.url}">खेलो · Play</a>
    `;
    libraryGrid.appendChild(card);
  });
}

// initial state
renderLibrary();
</script>
</body>
</html>
