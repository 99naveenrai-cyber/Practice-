<style>

  *{box-sizing:border-box;}html,body{margin:0;padding:0;}body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:20px 14px 40px}.wrap{width:100%;max-width:480px}.brand{text-align:center;font-family:'Berkshire Swash',cursive;font-size:28px;color:var(--gold);margin:6px 0 4px}.subbrand{text-align:center;color:var(--muted);font-size:12px;margin-bottom:18px;letter-spacing:1.5px;text-transform:uppercase}.video-embed{position:relative;width:100%;padding-top:56.25%;border-radius:14px;overflow:hidden;margin-bottom:16px;background:#000}.video-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}.card{background:var(--card);border:1px solid var(--card-edge);border-radius:18px;padding:22px 18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}.quiz-title{font-family:'Berkshire Swash',cursive;font-size:22px;margin:0 0 14px}.name-input{width:100%;background:#1C2C48;border:1px solid var(--card-edge);color:var(--text);font-family:inherit;font-size:15px;padding:13px 14px;border-radius:12px;margin-bottom:14px}.name-input::placeholder{color:var(--muted)}.primary-btn{width:100%;background:var(--gold);color:#1a1206;border:none;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;padding:14px;border-radius:12px;cursor:pointer}.result-wrap{text-align:center}.coin{font-size:46px;display:block;margin:6px 0 2px}.coin-count{font-family:'Berkshire Swash',cursive;font-size:40px;color:var(--gold);margin:0}.coin-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px}.score-line{font-size:16px;margin-bottom:18px}.score-line b{color:var(--text)}.roll-no{display:inline-block;background:rgba(255,201,60,.12);border:1px dashed var(--gold-dim);color:var(--gold);font-size:13px;font-weight:600;letter-spacing:1px;padding:6px 12px;border-radius:10px;margin-bottom:16px}.share-btn{background:#25D366;color:#06210f;margin-top:6px}.share-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px}.wa-status-btn{background:#128C7E;color:#fff}.insta-btn{background:linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7);color:#fff}.story-btn{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff}.copy-note{font-size:11px;color:var(--muted);line-height:1.4;margin-top:10px}.hidden{display:none!important}.footer-note{text-align:center;color:var(--muted);font-size:11px;margin-top:16px}
  #ideakdc-quiz-app .q-start{text-align:center}#ideakdc-quiz-app .q-title{font-family:'Berkshire Swash',cursive;color:var(--gold);font-size:24px;margin:0 0 10px}#ideakdc-quiz-app .q-sub{color:var(--muted);font-size:13px;line-height:1.5}.q-btn{border:0;border-radius:12px;padding:12px 14px;margin:5px;font-weight:800;font-family:'Poppins',sans-serif;cursor:pointer;background:var(--gold);color:#1a1206}.q-btn.secondary{background:#263a5c;color:var(--text);border:1px solid #3d557e}.q-top{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:10px}.q-bar-wrap{height:12px;background:#0d1728;border-radius:20px;overflow:hidden;margin:8px 0 13px}.q-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));transition:width 1s linear}.q-question{font-size:20px;line-height:1.35;font-weight:800;margin:12px 0 14px;color:var(--text)}.q-option{width:100%;text-align:left;background:#1C2C48;border:1px solid var(--card-edge);color:var(--text);border-radius:14px;padding:13px 12px;margin:8px 0;font-size:15px;font-weight:650;cursor:pointer;line-height:1.35}.q-option:hover{border-color:var(--gold)}.q-option.correct{background:rgba(74,222,128,.18);border-color:var(--green);box-shadow:0 0 14px rgba(74,222,128,.9)}.q-option.wrong{background:rgba(248,113,113,.18);border-color:var(--red);box-shadow:0 0 14px rgba(248,113,113,.9)}.q-msg{min-height:24px;font-size:14px;font-weight:800;margin-top:10px;color:var(--gold)}.q-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.q-controls .q-btn{width:100%;margin:0}.q-note{font-size:12px;color:var(--muted);line-height:1.4;margin-top:10px}.q-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;color:var(--muted);font-size:13px}#ideakdc-quiz-app input[type=checkbox]{width:18px;height:18px}

  .sound-row{display:flex;justify-content:center;margin:-6px 0 14px}.sound-btn{background:#263a5c;color:var(--text);border:1px solid #3d557e;border-radius:999px;padding:8px 14px;font-weight:800;cursor:pointer}.q-msg{font-size:28px!important;text-align:center;line-height:1.25;text-shadow:0 0 14px rgba(255,201,60,.65);animation:msgPop .25s ease both}.q-msg.wrong-big{color:#ff9aa0;text-shadow:0 0 14px rgba(248,113,113,.65)}.q-msg.correct-big{color:var(--gold)}@keyframes msgPop{from{transform:scale(.85);opacity:.2}to{transform:scale(1);opacity:1}}.q-option.try-wrong{animation:shake .28s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}.popper-layer{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}.confetti-piece{position:fixed;width:9px;height:14px;border-radius:3px;animation:confettiFall 1.2s ease-out forwards}.big-popper{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);font-size:58px;animation:bigPop 1s ease-out forwards;text-shadow:0 0 18px rgba(255,255,255,.85)}@keyframes confettiFall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(720deg);opacity:0}}@keyframes bigPop{0%{transform:translate(-50%,-50%) scale(.2);opacity:0}30%{transform:translate(-50%,-50%) scale(1.35);opacity:1}100%{transform:translate(-50%,-70%) scale(.9);opacity:0}}

  .option-wrap{margin:8px 0}.option-wrap .q-option{margin:0}.inline-feedback{font-size:25px;font-weight:900;line-height:1.25;text-align:center;padding:10px 8px 4px;animation:msgPop .25s ease both}.inline-feedback.correct-inline{color:var(--gold);text-shadow:0 0 14px rgba(255,201,60,.75)}.inline-feedback.wrong-inline{color:#ff9aa0;text-shadow:0 0 14px rgba(248,113,113,.72)}

<body>
<div class="wrap">
  <div class="brand">IDEAKDC</div><div class="subbrand">Video ka Quiz</div><div class="video-embed" id="video-embed"></div>
  <div class="card" id="quiz-card"><div id="ideakdc-quiz-app"></div></div>
  <div class="card hidden" id="screen-name" style="margin-top:14px;"><h2 class="quiz-title">Shaandaar!</h2><p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Apna naam likho taaki score aur coins dikha sakein.</p><input type="text" id="name-input" class="name-input" placeholder="Apna naam yahan likhein"><button class="primary-btn" id="submit-name-btn">Result Dekho</button></div>
  <div class="card hidden result-wrap" id="screen-result" style="margin-top:14px;"><div id="result-greeting" style="color:var(--muted);font-size:14px;"></div><span class="coin">🪙</span><p class="coin-count" id="coin-count">0</p><div class="coin-label">Coins Earned</div><div class="score-line">Score: <b id="score-text"></b></div><div class="share-grid"><button class="primary-btn share-btn" id="share-btn">WhatsApp par Share Karo</button><button class="primary-btn wa-status-btn" id="wa-status-btn">WhatsApp Status ke liye Copy/Open</button><button class="primary-btn insta-btn" id="insta-share-btn">Instagram Share</button><button class="primary-btn story-btn" id="insta-story-btn">Instagram Story</button></div><div class="copy-note" id="share-copy-note">Share message me quiz link hamesha: practicekarlo.ideakdc.in</div></div>
  <div class="footer-note">IDEAKDC · Apni video dekho, seekho, coins jeeto</div>
</div>
<script>
const VIDEO_URL = "https://youtu.be/tlZLUOBury4";
const QUIZ_TITLE = "Reflection of Light";
const COINS_PER_CORRECT = 10;
const CORRECT_MESSAGES = ["सही है", "Good Going!", "Wah!", "शानदार", "अद्भुत", "कमाल कर दिया", "Outstanding!", "Excellent!", "बिलकुल सही जवाब", "ठीक है"];
const WRONG_MESSAGES = ["गलत है जी", "दोबारा ट्राई करो", "फिर से सोचो", "दिमाग लगाओ", "कैसे कैसे लोग आ जाते हैं", "नहीं... नहीं...", "गलत है", "एक मौका दिया"];
let lastCorrectMsg = "";
let lastWrongMsg = "";
let soundOn = true;
try{ soundOn = localStorage.getItem("ideakdc_sound") !== "off"; }catch(e){}

function getYoutubeId(url){
  if(!url) return null;
  const patterns=[/youtu\.be\/([^?&/]+)/,/youtube\.com\/watch\?[^#]*v=([^?&/]+)/,/youtube\.com\/embed\/([^?&/]+)/,/youtube\.com\/shorts\/([^?&/]+)/];
  for(const pattern of patterns){ const m=url.match(pattern); if(m) return m[1]; }
  return null;
}
function getEmbedUrl(url){const id=getYoutubeId(url);return id?`https://www.youtube-nocookie.com/embed/${id}?rel=0&modestbranding=1&playsinline=1`:null;}
const embedUrl=getEmbedUrl(VIDEO_URL);
if(embedUrl){
  document.getElementById("video-embed").innerHTML=`<iframe src="${embedUrl}" title="IDEAKDC video lesson" loading="lazy" referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
  const videoId=getYoutubeId(VIDEO_URL);
  const fallback=document.createElement('div');
  fallback.style.cssText='text-align:center;margin:-8px 0 14px;color:var(--muted);font-size:12px;';
  fallback.innerHTML=`अगर video यहाँ न चले तो <a style="color:var(--gold);font-weight:800;" href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener">YouTube पर खोलें</a>`;
  document.getElementById("video-embed").after(fallback);
}else{document.getElementById("video-embed").style.display="none";}
function randomNonRepeat(arr,last){let pick=arr[Math.floor(Math.random()*arr.length)];if(arr.length>1){while(pick===last) pick=arr[Math.floor(Math.random()*arr.length)];}return pick;}
function getOrCreateRollNo(name){const storageKey=`ideakdc_rollno_${name.trim().toLowerCase()}`;try{const existing=localStorage.getItem(storageKey);if(existing)return existing;}catch(e){}const initials=name.trim().slice(0,3).toUpperCase().padEnd(3,"X");const rand=Math.floor(1000+Math.random()*9000);const rollNo=`IDK-${initials}-${rand}`;try{localStorage.setItem(storageKey,rollNo);}catch(e){}return rollNo;}
function animateCoinCount(target){const el=document.getElementById("coin-count");let curr=0;const step=Math.max(1,Math.ceil(target/20));const iv=setInterval(()=>{curr=Math.min(target,curr+step);el.textContent=curr;if(curr>=target)clearInterval(iv);},30);}
function audioTone(freq=660,duration=.12,type="sine",vol=.08){if(!soundOn)return;try{const AC=window.AudioContext||window.webkitAudioContext;const ctx=new AC();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.value=vol;osc.connect(gain);gain.connect(ctx.destination);osc.start();gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+duration);osc.stop(ctx.currentTime+duration+.02);}catch(e){}}
function playCorrectSound(){audioTone(720,.09,"sine",.08);setTimeout(()=>audioTone(960,.12,"sine",.07),80);}
function playWrongSound(){audioTone(190,.18,"triangle",.055);}
function playVictorySound(){audioTone(523,.12,"sine",.075);setTimeout(()=>audioTone(659,.12,"sine",.075),110);setTimeout(()=>audioTone(784,.18,"sine",.075),220);}
function confetti(big=false){let layer=document.querySelector('.popper-layer');if(!layer){layer=document.createElement('div');layer.className='popper-layer';document.body.appendChild(layer);}const colors=['#FFC93C','#4ADE80','#F87171','#3BA7F0','#FF9F1C','#E879F9'];const count=big?80:28;for(let i=0;i<count;i++){const piece=document.createElement('div');piece.className='confetti-piece';piece.style.background=colors[i%colors.length];piece.style.left=(big?50:50)+(Math.random()*50-25)+'vw';piece.style.top=(big?42:48)+(Math.random()*10-5)+'vh';piece.style.setProperty('--dx',(Math.random()*420-210)+'px');piece.style.setProperty('--dy',(-Math.random()*360-90)+'px');piece.style.animationDuration=(big?1.5:1.0+Math.random()*.35)+'s';layer.appendChild(piece);setTimeout(()=>piece.remove(),1800);}if(big){const pop=document.createElement('div');pop.className='big-popper';pop.textContent='🎉🎊';layer.appendChild(pop);setTimeout(()=>pop.remove(),1200);} }

const PUBLIC_QUIZ_URL = "https://practicekarlo.ideakdc.in/10th/science/chapter10/reflection-of-light/";
function getPublicQuizLink(){
  try{
    const href = window.location.href.split("?")[0].split("#")[0];
    const host = window.location.hostname;
    if(host && host !== "localhost" && host !== "127.0.0.1") return href;
  }catch(e){}
  return PUBLIC_QUIZ_URL;
}
function buildShareMessage(name, correctCount, totalQuestions, coins){
  const quizLink = getPublicQuizLink();
  const positive = correctCount >= 8 ? "Outstanding performance!" : correctCount >= 6 ? "Good going! Practice se aur strong banoge." : "Good effort! Practice karte raho, improvement pakka hai.";
  return `🎉 ${name} ne IDEAKDC ka "${QUIZ_TITLE}" quiz complete kiya!\n${positive}\nScore: ${correctCount}/${totalQuestions} | Coins: ${coins}\n\nAap bhi quiz khelo aur apni preparation check karo 👇\n${quizLink}`;
}
async function copyShareMessage(msg){
  try{await navigator.clipboard.writeText(msg);return true;}catch(e){
    try{const ta=document.createElement('textarea');ta.value=msg;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();return true;}catch(err){return false;}
  }
}
function setShareNote(text){const el=document.getElementById('share-copy-note');if(el)el.textContent=text;}
window.ideakdcFinish=function(correctCount,totalQuestions){playVictorySound();confetti(true);document.getElementById("quiz-card").classList.add("hidden");try{const lastName=localStorage.getItem("ideakdc_last_name");if(lastName)document.getElementById("name-input").value=lastName;}catch(e){}document.getElementById("screen-name").classList.remove("hidden");document.getElementById("submit-name-btn").onclick=()=>{const name=document.getElementById("name-input").value.trim()||"Student";const coins=correctCount*COINS_PER_CORRECT;const rollNo=getOrCreateRollNo(name);try{const key=`ideakdc_quiz_${QUIZ_TITLE}_${name.trim().toLowerCase()}`;localStorage.setItem(key,JSON.stringify({name,rollNo,correctCount,totalQuestions,coins,date:new Date().toISOString(),shareLink:getPublicQuizLink()}));localStorage.setItem("ideakdc_last_name",name);}catch(e){}const shareMsg=buildShareMessage(name,correctCount,totalQuestions,coins);document.getElementById("result-greeting").textContent=`Shaabash, ${name}! Tumne practice complete ki.`;document.getElementById("score-text").textContent=`${correctCount}/${totalQuestions}`;document.getElementById("screen-name").classList.add("hidden");document.getElementById("screen-result").classList.remove("hidden");animateCoinCount(coins);document.getElementById("share-btn").onclick=()=>{window.open(`https://wa.me/?text=${encodeURIComponent(shareMsg)}`,"_blank");};document.getElementById("wa-status-btn").onclick=async()=>{await copyShareMessage(shareMsg);setShareNote("Message copy ho gaya. WhatsApp Status me paste karo. Link included: "+getPublicQuizLink());window.open(`https://wa.me/?text=${encodeURIComponent(shareMsg)}`,"_blank");};document.getElementById("insta-share-btn").onclick=async()=>{await copyShareMessage(shareMsg);setShareNote("Instagram ke liye message copy ho gaya. Instagram open karke caption/DM me paste karo. Link included: "+getPublicQuizLink());window.open("https://www.instagram.com/","_blank");};document.getElementById("insta-story-btn").onclick=async()=>{await copyShareMessage(shareMsg);setShareNote("Instagram Story ke liye message copy ho gaya. Story me text/link paste karo. Link included: "+getPublicQuizLink());window.location.href="instagram://story-camera";setTimeout(()=>{window.open("https://www.instagram.com/","_blank");},700);};};};
const QUESTIONS=[
 {q:"A highly polished surface mostly does what to the light falling on it?",opts:["Reflects most light","Absorbs all light","Refracts all light","Stops light completely"],ans:0},
 {q:"According to the first law of reflection, angle of incidence is equal to:",opts:["Angle of refraction","Angle of reflection","Angle of deviation","Angle of dispersion"],ans:1},
 {q:"Incident ray, reflected ray and normal at the point of incidence lie in:",opts:["Different planes","Same plane","Opposite planes","No fixed plane"],ans:1},
 {q:"Image formed by a plane mirror is always:",opts:["Real and inverted","Virtual and erect","Real and erect","Virtual and inverted"],ans:1},
 {q:"In a plane mirror, image distance is:",opts:["Less than object distance","Greater than object distance","Equal to object distance","Always zero"],ans:2},
 {q:"Reflecting surface curved inwards is called:",opts:["Convex mirror","Plane mirror","Concave mirror","Transparent mirror"],ans:2},
 {q:"Reflecting surface curved outwards is called:",opts:["Concave mirror","Convex mirror","Plane mirror","Rough mirror"],ans:1},
 {q:"The centre of the reflecting surface of a spherical mirror is called:",opts:["Focus","Pole","Aperture","Principal axis"],ans:1},
 {q:"The centre of the sphere of which a spherical mirror is a part is:",opts:["Pole","Principal focus","Centre of curvature","Aperture"],ans:2},
 {q:"The line passing through pole and centre of curvature is called:",opts:["Principal axis","Normal axis","Focal line","Mirror line"],ans:0}
];
(function(){
const app=document.getElementById('ideakdc-quiz-app');
let idx=0,score=0,selected=[],locked=[],timerOn=true,paused=false,timeLeft=30,timer=null,finished=false;

function shuffleAll(){
  QUESTIONS.forEach(q=>{
    let correct=q.opts[q.ans];
    for(let i=q.opts.length-1;i>0;i--){
      let j=Math.floor(Math.random()*(i+1));
      [q.opts[i],q.opts[j]]=[q.opts[j],q.opts[i]];
    }
    q.ans=q.opts.indexOf(correct);
  });
}
function soundButton(){return `<div class="sound-row"><button class="sound-btn" id="soundBtn">${soundOn?'🔊 Sound ON':'🔇 Sound OFF'}</button></div>`;}
function bindSound(){const b=document.getElementById('soundBtn');if(!b)return;b.onclick=()=>{soundOn=!soundOn;try{localStorage.setItem('ideakdc_sound',soundOn?'on':'off');}catch(e){}b.textContent=soundOn?'🔊 Sound ON':'🔇 Sound OFF';};}
function startScreen(){
  app.innerHTML=`${soundButton()}<div class="q-start"><h2 class="q-title">Reflection of Light</h2><div class="q-sub">Class 10 Science • 10 MCQ • Timer, Previous/Next, Restart</div><label class="q-toggle"><input type="checkbox" id="timerToggle" checked> Use 30-second timer</label><button class="q-btn" id="startBtn">Start Quiz</button></div>`;
  bindSound();
  document.getElementById('startBtn').onclick=()=>{timerOn=document.getElementById('timerToggle').checked;restart();};
}
function restart(){
  clearInterval(timer);shuffleAll();idx=0;score=0;
  selected=Array(QUESTIONS.length).fill(null);
  locked=Array(QUESTIONS.length).fill(false);
  paused=false;finished=false;
  document.getElementById('quiz-card').classList.remove('hidden');
  document.getElementById('screen-name').classList.add('hidden');
  document.getElementById('screen-result').classList.add('hidden');
  show();
}
function optionHtml(q){
  return q.opts.map((o,i)=>`<div class="option-wrap" data-wrap="${i}"><button class="q-option" data-i="${i}"><b>${String.fromCharCode(65+i)}.</b> ${o}</button><div class="inline-feedback hidden" data-feedback="${i}"></div></div>`).join('');
}
function show(){
  clearInterval(timer);paused=false;timeLeft=30;
  let q=QUESTIONS[idx];
  app.innerHTML=`${soundButton()}<div class="q-top"><div>Q ${idx+1}/${QUESTIONS.length}</div><div>Score: ${score}</div><div>${timerOn?'Time: <span id="time">30</span>s':'Timer Off'}</div></div><div class="q-bar-wrap" style="${timerOn?'':'display:none'}"><div class="q-bar" id="bar"></div></div><div class="q-question">${q.q}</div><div>${optionHtml(q)}</div><div class="q-note">गलत हो तो फिर से try करो. सही होने पर Next दबाओ.</div><div class="q-controls"><button class="q-btn secondary" id="prev">Previous</button><button class="q-btn secondary" id="next">Next</button><button class="q-btn" id="finish">Finish</button><button class="q-btn secondary" id="restart">Restart</button></div>`;
  bindSound();
  document.querySelectorAll('.q-option').forEach(b=>b.onclick=()=>pick(+b.dataset.i,b));
  document.getElementById('prev').onclick=prev;
  document.getElementById('next').onclick=next;
  document.getElementById('finish').onclick=finish;
  document.getElementById('restart').onclick=startScreen;
  if(locked[idx]) revealCorrect(false);
  if(timerOn&&!locked[idx]) startTimer();
}
function startTimer(){
  updateTimer();
  timer=setInterval(()=>{
    if(paused||locked[idx])return;
    timeLeft--;updateTimer();
    if(timeLeft<=0){clearInterval(timer);showFloatingNote('😔 समय समाप्त! अब सही जवाब खोजो','wrong');playWrongSound();}
  },1000);
}
function updateTimer(){let t=document.getElementById('time'),b=document.getElementById('bar');if(t)t.textContent=timeLeft;if(b)b.style.width=(timeLeft/30*100)+'%';}
function clearInlineFeedback(){document.querySelectorAll('.inline-feedback').forEach(el=>{el.className='inline-feedback hidden';el.textContent='';});document.querySelectorAll('.q-option').forEach(b=>b.classList.remove('try-wrong','wrong'));}
function showInlineFeedback(i,text,type){
  clearInlineFeedback();
  const fb=document.querySelector(`.inline-feedback[data-feedback="${i}"]`);
  if(!fb)return;
  fb.className=`inline-feedback ${type==='correct'?'correct-inline':'wrong-inline'}`;
  fb.textContent=text;
}
function showFloatingNote(text,type){
  let note=document.createElement('div');
  note.className=`inline-feedback ${type==='correct'?'correct-inline':'wrong-inline'}`;
  note.style.cssText='position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9998;background:rgba(15,27,45,.92);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:16px 18px;max-width:86%;';
  note.textContent=text;
  document.body.appendChild(note);
  setTimeout(()=>note.remove(),1200);
}
function pick(i,btn){
  if(locked[idx])return;
  let q=QUESTIONS[idx];
  if(i===q.ans){
    clearInterval(timer);selected[idx]=i;locked[idx]=true;score++;
    playCorrectSound();confetti(false);if((idx+1)%5===0)confetti(true);
    revealCorrect(true);
  }else{
    selected[idx]=i;playWrongSound();
    document.querySelectorAll('.q-option').forEach(x=>x.classList.remove('try-wrong','wrong'));
    btn.classList.add('wrong','try-wrong');
    const msg=randomNonRepeat(WRONG_MESSAGES,lastWrongMsg);lastWrongMsg=msg;
    showInlineFeedback(i,'😔 '+msg,'wrong');
  }
}
function revealCorrect(newAttempt=true){
  let q=QUESTIONS[idx],choice=selected[idx];
  document.querySelectorAll('.q-option').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');if(i===choice&&i!==q.ans)b.classList.add('wrong');});
  const msg=randomNonRepeat(CORRECT_MESSAGES,lastCorrectMsg);lastCorrectMsg=msg;
  showInlineFeedback(q.ans,'🎉 '+msg,'correct');
}
function next(){
  clearInterval(timer);
  if(!locked[idx]){showFloatingNote('पहले सही जवाब चुनो','wrong');return;}
  if(idx<QUESTIONS.length-1){idx++;show();}else finish();
}
function prev(){
  clearInterval(timer);
  // Important: moving back from an unattempted question does not reveal anything for that question.
  // Previous question will show feedback only if it had already been solved earlier.
  if(idx>0){idx--;show();}
}
function finish(){clearInterval(timer);if(finished)return;finished=true;window.ideakdcFinish(score,QUESTIONS.length);}
document.addEventListener('keydown',e=>{if(document.getElementById('quiz-card').classList.contains('hidden'))return;if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
startScreen();
})();
</script>
