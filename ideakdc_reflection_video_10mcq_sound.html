<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEAKDC Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0F1B2D;--card:#16233A;--card-edge:#22344F;--gold:#FFC93C;--gold-dim:#8A6E1E;--green:#4ADE80;--red:#F87171;--text:#EAF0F6;--muted:#8AA0BE;}
  *{box-sizing:border-box;}html,body{margin:0;padding:0;}body{background:var(--bg);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:20px 14px 40px}.wrap{width:100%;max-width:480px}.brand{text-align:center;font-family:'Berkshire Swash',cursive;font-size:28px;color:var(--gold);margin:6px 0 4px}.subbrand{text-align:center;color:var(--muted);font-size:12px;margin-bottom:18px;letter-spacing:1.5px;text-transform:uppercase}.video-embed{position:relative;width:100%;padding-top:56.25%;border-radius:14px;overflow:hidden;margin-bottom:16px;background:#000}.video-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}.card{background:var(--card);border:1px solid var(--card-edge);border-radius:18px;padding:22px 18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}.quiz-title{font-family:'Berkshire Swash',cursive;font-size:22px;margin:0 0 14px}.name-input{width:100%;background:#1C2C48;border:1px solid var(--card-edge);color:var(--text);font-family:inherit;font-size:15px;padding:13px 14px;border-radius:12px;margin-bottom:14px}.name-input::placeholder{color:var(--muted)}.primary-btn{width:100%;background:var(--gold);color:#1a1206;border:none;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;padding:14px;border-radius:12px;cursor:pointer}.result-wrap{text-align:center}.coin{font-size:46px;display:block;margin:6px 0 2px}.coin-count{font-family:'Berkshire Swash',cursive;font-size:40px;color:var(--gold);margin:0}.coin-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:18px}.score-line{font-size:16px;margin-bottom:18px}.score-line b{color:var(--text)}.roll-no{display:inline-block;background:rgba(255,201,60,.12);border:1px dashed var(--gold-dim);color:var(--gold);font-size:13px;font-weight:600;letter-spacing:1px;padding:6px 12px;border-radius:10px;margin-bottom:16px}.share-btn{background:#25D366;color:#06210f;margin-top:6px}.hidden{display:none!important}.footer-note{text-align:center;color:var(--muted);font-size:11px;margin-top:16px}
  #ideakdc-quiz-app .q-start{text-align:center}#ideakdc-quiz-app .q-title{font-family:'Berkshire Swash',cursive;color:var(--gold);font-size:24px;margin:0 0 10px}#ideakdc-quiz-app .q-sub{color:var(--muted);font-size:13px;line-height:1.5}.q-btn{border:0;border-radius:12px;padding:12px 14px;margin:5px;font-weight:800;font-family:'Poppins',sans-serif;cursor:pointer;background:var(--gold);color:#1a1206}.q-btn.secondary{background:#263a5c;color:var(--text);border:1px solid #3d557e}.q-top{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:10px}.q-bar-wrap{height:12px;background:#0d1728;border-radius:20px;overflow:hidden;margin:8px 0 13px}.q-bar{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));transition:width 1s linear}.q-question{font-size:20px;line-height:1.35;font-weight:800;margin:12px 0 14px;color:var(--text)}.q-option{width:100%;text-align:left;background:#1C2C48;border:1px solid var(--card-edge);color:var(--text);border-radius:14px;padding:13px 12px;margin:8px 0;font-size:15px;font-weight:650;cursor:pointer;line-height:1.35}.q-option:hover{border-color:var(--gold)}.q-option.correct{background:rgba(74,222,128,.18);border-color:var(--green);box-shadow:0 0 14px rgba(74,222,128,.9)}.q-option.wrong{background:rgba(248,113,113,.18);border-color:var(--red);box-shadow:0 0 14px rgba(248,113,113,.9)}.q-msg{min-height:24px;font-size:14px;font-weight:800;margin-top:10px;color:var(--gold)}.q-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.q-controls .q-btn{width:100%;margin:0}.q-note{font-size:12px;color:var(--muted);line-height:1.4;margin-top:10px}.q-toggle{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;color:var(--muted);font-size:13px}#ideakdc-quiz-app input[type=checkbox]{width:18px;height:18px}

  .sound-row{display:flex;justify-content:center;margin:-6px 0 14px}.sound-btn{background:#263a5c;color:var(--text);border:1px solid #3d557e;border-radius:999px;padding:8px 14px;font-weight:800;cursor:pointer}.q-msg{font-size:28px!important;text-align:center;line-height:1.25;text-shadow:0 0 14px rgba(255,201,60,.65);animation:msgPop .25s ease both}.q-msg.wrong-big{color:#ff9aa0;text-shadow:0 0 14px rgba(248,113,113,.65)}.q-msg.correct-big{color:var(--gold)}@keyframes msgPop{from{transform:scale(.85);opacity:.2}to{transform:scale(1);opacity:1}}.q-option.try-wrong{animation:shake .28s ease}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}.popper-layer{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}.confetti-piece{position:fixed;width:9px;height:14px;border-radius:3px;animation:confettiFall 1.2s ease-out forwards}.big-popper{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);font-size:58px;animation:bigPop 1s ease-out forwards;text-shadow:0 0 18px rgba(255,255,255,.85)}@keyframes confettiFall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(720deg);opacity:0}}@keyframes bigPop{0%{transform:translate(-50%,-50%) scale(.2);opacity:0}30%{transform:translate(-50%,-50%) scale(1.35);opacity:1}100%{transform:translate(-50%,-70%) scale(.9);opacity:0}}

</style>
</head>
<body>
<div class="wrap">
  <div class="brand">IDEAKDC</div><div class="subbrand">Video ka Quiz</div><div class="video-embed" id="video-embed"></div>
  <div class="card" id="quiz-card"><div id="ideakdc-quiz-app"></div></div>
  <div class="card hidden" id="screen-name" style="margin-top:14px;"><h2 class="quiz-title">Shaandaar!</h2><p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Apna naam likho taaki score aur coins dikha sakein.</p><input type="text" id="name-input" class="name-input" placeholder="Apna naam yahan likhein"><button class="primary-btn" id="submit-name-btn">Result Dekho</button></div>
  <div class="card hidden result-wrap" id="screen-result" style="margin-top:14px;"><div id="result-greeting" style="color:var(--muted);font-size:14px;"></div><span class="coin">🪙</span><p class="coin-count" id="coin-count">0</p><div class="coin-label">Coins Earned</div><div class="score-line">Score: <b id="score-text"></b></div><div class="roll-no" id="roll-no-display"></div><button class="primary-btn share-btn" id="share-btn">WhatsApp par Share Karo</button></div>
  <div class="footer-note">IDEAKDC · Apni video dekho, seekho, coins jeeto</div>
</div>
<script>
const VIDEO_URL = "https://youtu.be/tlZLUOBury4";
const QUIZ_TITLE = "Reflection of Light";
const COINS_PER_CORRECT = 10;
const CORRECT_MESSAGES = ["सही है", "Good Going!", "Wah!", "शानदार", "अद्भुत", "कमाल कर दिया", "Outstanding!", "Excellent!", "बिलकुल सही जवाब", "ठीक है"];
const WRONG_MESSAGES = ["गलत है जी", "दोबारा ट्राई करो", "फिर से सोचो", "दिमाग लगाओ", "कैसे कैसे लोग आ जाते हैं", "नहीं... नहीं...", "गलत है", "एक मौका दिया"];
let lastCorrectMsg = "";
let lastWrongMsg = "";
let soundOn = true;
try{ soundOn = localStorage.getItem("ideakdc_sound") !== "off"; }catch(e){}

function getEmbedUrl(url){if(!url)return null;let id="";const s=url.match(/youtu\.be\/([^?&]+)/);const l=url.match(/[?&]v=([^?&]+)/);if(s)id=s[1];else if(l)id=l[1];else return null;return `https://www.youtube.com/embed/${id}`;}
const embedUrl=getEmbedUrl(VIDEO_URL);if(embedUrl){document.getElementById("video-embed").innerHTML=`<iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;}else{document.getElementById("video-embed").style.display="none";}
function randomNonRepeat(arr,last){let pick=arr[Math.floor(Math.random()*arr.length)];if(arr.length>1){while(pick===last) pick=arr[Math.floor(Math.random()*arr.length)];}return pick;}
function getOrCreateRollNo(name){const storageKey=`ideakdc_rollno_${name.trim().toLowerCase()}`;try{const existing=localStorage.getItem(storageKey);if(existing)return existing;}catch(e){}const initials=name.trim().slice(0,3).toUpperCase().padEnd(3,"X");const rand=Math.floor(1000+Math.random()*9000);const rollNo=`IDK-${initials}-${rand}`;try{localStorage.setItem(storageKey,rollNo);}catch(e){}return rollNo;}
function animateCoinCount(target){const el=document.getElementById("coin-count");let curr=0;const step=Math.max(1,Math.ceil(target/20));const iv=setInterval(()=>{curr=Math.min(target,curr+step);el.textContent=curr;if(curr>=target)clearInterval(iv);},30);}
function audioTone(freq=660,duration=.12,type="sine",vol=.08){if(!soundOn)return;try{const AC=window.AudioContext||window.webkitAudioContext;const ctx=new AC();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.value=vol;osc.connect(gain);gain.connect(ctx.destination);osc.start();gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+duration);osc.stop(ctx.currentTime+duration+.02);}catch(e){}}
function playCorrectSound(){audioTone(720,.09,"sine",.08);setTimeout(()=>audioTone(960,.12,"sine",.07),80);}
function playWrongSound(){audioTone(190,.18,"triangle",.055);}
function playVictorySound(){audioTone(523,.12,"sine",.075);setTimeout(()=>audioTone(659,.12,"sine",.075),110);setTimeout(()=>audioTone(784,.18,"sine",.075),220);}
function confetti(big=false){let layer=document.querySelector('.popper-layer');if(!layer){layer=document.createElement('div');layer.className='popper-layer';document.body.appendChild(layer);}const colors=['#FFC93C','#4ADE80','#F87171','#3BA7F0','#FF9F1C','#E879F9'];const count=big?80:28;for(let i=0;i<count;i++){const piece=document.createElement('div');piece.className='confetti-piece';piece.style.background=colors[i%colors.length];piece.style.left=(big?50:50)+(Math.random()*50-25)+'vw';piece.style.top=(big?42:48)+(Math.random()*10-5)+'vh';piece.style.setProperty('--dx',(Math.random()*420-210)+'px');piece.style.setProperty('--dy',(Math.random()*360+80)+'px');piece.style.animationDuration=(big?1.5:1.0+Math.random()*.35)+'s';layer.appendChild(piece);setTimeout(()=>piece.remove(),1800);}if(big){const pop=document.createElement('div');pop.className='big-popper';pop.textContent='🎉🎊';layer.appendChild(pop);setTimeout(()=>pop.remove(),1200);} }
window.ideakdcFinish=function(correctCount,totalQuestions){playVictorySound();confetti(true);document.getElementById("quiz-card").classList.add("hidden");try{const lastName=localStorage.getItem("ideakdc_last_name");if(lastName)document.getElementById("name-input").value=lastName;}catch(e){}document.getElementById("screen-name").classList.remove("hidden");document.getElementById("submit-name-btn").onclick=()=>{const name=document.getElementById("name-input").value.trim()||"Student";const coins=correctCount*COINS_PER_CORRECT;const rollNo=getOrCreateRollNo(name);try{const key=`ideakdc_quiz_${QUIZ_TITLE}_${name.trim().toLowerCase()}`;localStorage.setItem(key,JSON.stringify({name,rollNo,correctCount,totalQuestions,coins,date:new Date().toISOString()}));localStorage.setItem("ideakdc_last_name",name);}catch(e){}document.getElementById("result-greeting").textContent=`Shaabash, ${name}!`;document.getElementById("score-text").textContent=`${correctCount}/${totalQuestions}`;document.getElementById("roll-no-display").textContent=`Roll No: ${rollNo}`;document.getElementById("screen-name").classList.add("hidden");document.getElementById("screen-result").classList.remove("hidden");animateCoinCount(coins);document.getElementById("share-btn").onclick=()=>{const quizLink=window.location.href.split("?")[0];const msg=`Maine IDEAKDC ka "${QUIZ_TITLE}" quiz khela — ${correctCount}/${totalQuestions} sahi jawab aur ${coins} coins jeete! Mera Roll No: ${rollNo}\nTum bhi try karo: ${quizLink}`;window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");};};};
const QUESTIONS=[
 {q:"A highly polished surface mostly does what to the light falling on it?",opts:["Reflects most light","Absorbs all light","Refracts all light","Stops light completely"],ans:0},
 {q:"According to the first law of reflection, angle of incidence is equal to:",opts:["Angle of refraction","Angle of reflection","Angle of deviation","Angle of dispersion"],ans:1},
 {q:"Incident ray, reflected ray and normal at the point of incidence lie in:",opts:["Different planes","Same plane","Opposite planes","No fixed plane"],ans:1},
 {q:"Image formed by a plane mirror is always:",opts:["Real and inverted","Virtual and erect","Real and erect","Virtual and inverted"],ans:1},
 {q:"In a plane mirror, image distance is:",opts:["Less than object distance","Greater than object distance","Equal to object distance","Always zero"],ans:2},
 {q:"Reflecting surface curved inwards is called:",opts:["Convex mirror","Plane mirror","Concave mirror","Transparent mirror"],ans:2},
 {q:"Reflecting surface curved outwards is called:",opts:["Concave mirror","Convex mirror","Plane mirror","Rough mirror"],ans:1},
 {q:"The centre of the reflecting surface of a spherical mirror is called:",opts:["Focus","Pole","Aperture","Principal axis"],ans:1},
 {q:"The centre of the sphere of which a spherical mirror is a part is:",opts:["Pole","Principal focus","Centre of curvature","Aperture"],ans:2},
 {q:"The line passing through pole and centre of curvature is called:",opts:["Principal axis","Normal axis","Focal line","Mirror line"],ans:0}
];
(function(){const app=document.getElementById('ideakdc-quiz-app');let idx=0,score=0,selected=[],locked=[],timerOn=true,paused=false,timeLeft=30,timer=null,finished=false;function shuffleAll(){QUESTIONS.forEach(q=>{let correct=q.opts[q.ans];for(let i=q.opts.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[q.opts[i],q.opts[j]]=[q.opts[j],q.opts[i]];}q.ans=q.opts.indexOf(correct);});}
function soundButton(){return `<div class="sound-row"><button class="sound-btn" id="soundBtn">${soundOn?'🔊 Sound ON':'🔇 Sound OFF'}</button></div>`;}
function bindSound(){const b=document.getElementById('soundBtn');if(b)b.onclick=()=>{soundOn=!soundOn;try{localStorage.setItem('ideakdc_sound',soundOn?'on':'off');}catch(e){}b.textContent=soundOn?'🔊 Sound ON':'🔇 Sound OFF';};}
function startScreen(){app.innerHTML=`${soundButton()}<div class="q-start"><h2 class="q-title">Reflection of Light</h2><div class="q-sub">Class 10 Science • 10 MCQ • Video dekhna ya quiz start karna — dono free hai.</div><label class="q-toggle"><input type="checkbox" id="timerToggle" checked> Use 30-second timer</label><button class="q-btn" id="startBtn">Start Quiz</button></div>`;bindSound();document.getElementById('startBtn').onclick=()=>{timerOn=document.getElementById('timerToggle').checked;restart();};}
function restart(){clearInterval(timer);shuffleAll();idx=0;score=0;selected=Array(QUESTIONS.length).fill(null);locked=Array(QUESTIONS.length).fill(false);paused=false;finished=false;document.getElementById('quiz-card').classList.remove('hidden');document.getElementById('screen-name').classList.add('hidden');document.getElementById('screen-result').classList.add('hidden');show();}
function show(){clearInterval(timer);paused=false;timeLeft=30;let q=QUESTIONS[idx];app.innerHTML=`${soundButton()}<div class="q-top"><div>Q ${idx+1}/${QUESTIONS.length}</div><div>Score: ${score}</div><div>${timerOn?'Time: <span id="time">30</span>s':'Timer Off'}</div></div><div class="q-bar-wrap" style="${timerOn?'':'display:none'}"><div class="q-bar" id="bar"></div></div><div class="q-question">${q.q}</div><div>${q.opts.map((o,i)=>`<button class="q-option" data-i="${i}"><b>${String.fromCharCode(65+i)}.</b> ${o}</button>`).join('')}</div><div class="q-msg" id="msg"></div><div class="q-note">गलत हो तो फिर से try करो. सही होने पर Next दबाओ.</div><div class="q-controls"><button class="q-btn secondary" id="prev">Previous</button><button class="q-btn secondary" id="pause">${timerOn?'Pause':'Pause Off'}</button><button class="q-btn secondary" id="next">Next</button><button class="q-btn" id="finish">Finish</button><button class="q-btn secondary" id="restart">Restart</button></div>`;bindSound();document.querySelectorAll('.q-option').forEach(b=>b.onclick=()=>pick(+b.dataset.i,b));document.getElementById('prev').onclick=prev;document.getElementById('next').onclick=next;document.getElementById('pause').onclick=pause;document.getElementById('finish').onclick=finish;document.getElementById('restart').onclick=startScreen;if(locked[idx])revealCorrect();if(timerOn&&!locked[idx])startTimer();}
function startTimer(){updateTimer();timer=setInterval(()=>{if(paused||locked[idx])return;timeLeft--;updateTimer();if(timeLeft<=0){clearInterval(timer);document.getElementById('msg').className='q-msg wrong-big';document.getElementById('msg').textContent='😔 समय समाप्त! अब सही जवाब खोजो';playWrongSound();}},1000);}function updateTimer(){let t=document.getElementById('time'),b=document.getElementById('bar');if(t)t.textContent=timeLeft;if(b)b.style.width=(timeLeft/30*100)+'%';}
function pick(i,btn){if(locked[idx])return;let q=QUESTIONS[idx];if(i===q.ans){clearInterval(timer);selected[idx]=i;locked[idx]=true;score++;playCorrectSound();confetti(false);if((idx+1)%5===0)confetti(true);revealCorrect();}else{selected[idx]=i;playWrongSound();document.querySelectorAll('.q-option').forEach(x=>x.classList.remove('try-wrong','wrong'));btn.classList.add('wrong','try-wrong');const msg=randomNonRepeat(WRONG_MESSAGES,lastWrongMsg);lastWrongMsg=msg;const el=document.getElementById('msg');el.className='q-msg wrong-big';el.textContent='😔 '+msg;}}
function revealCorrect(){let q=QUESTIONS[idx],choice=selected[idx];document.querySelectorAll('.q-option').forEach((b,i)=>{b.disabled=true;if(i===q.ans)b.classList.add('correct');if(i===choice&&i!==q.ans)b.classList.add('wrong');});const msg=randomNonRepeat(CORRECT_MESSAGES,lastCorrectMsg);lastCorrectMsg=msg;const el=document.getElementById('msg');el.className='q-msg correct-big';el.textContent='🎉 '+msg;}
function next(){clearInterval(timer);if(!locked[idx]){document.getElementById('msg').className='q-msg wrong-big';document.getElementById('msg').textContent='पहले सही जवाब चुनो';return;}if(idx<QUESTIONS.length-1){idx++;show();}else finish();}function prev(){clearInterval(timer);if(idx>0){idx--;show();}}function pause(){if(!timerOn||locked[idx])return;paused=!paused;document.getElementById('pause').textContent=paused?'Resume':'Pause';document.getElementById('msg').textContent=paused?'Paused':'Resumed';}function finish(){clearInterval(timer);if(finished)return;finished=true;window.ideakdcFinish(score,QUESTIONS.length);}document.addEventListener('keydown',e=>{if(document.getElementById('quiz-card').classList.contains('hidden'))return;if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.code==='Space'){e.preventDefault();pause();}});startScreen();})();
</script>
</body>
</html>
